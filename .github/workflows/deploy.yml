name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            index.html
            ai-news.html
            ai-news.css
            ai-news.js
            erp-dashboard.html
            erp-dashboard.css
            erp-dashboard.js
            erp-report.js
            erp-upload.html
            erp-upload.css
            erp-upload.js
            erp-common.css
            erp-data.js
            erp_data
            style.css
            menu.js
            snake.js
            fighter.js
            stock-report.html
            stock-report.css
            stock-report.js
            stock_data

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
